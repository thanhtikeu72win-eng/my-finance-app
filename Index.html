<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #2c3e50; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <!-- အောက်ပါ လင့်ခ်နေရာတွင် မိမိ၏ Google Apps Script လင့်ခ်ကို အစားထိုးပါ -->
    <iframe src="YOUR_SCRIPT_URL_HERE" allowfullscreen></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('App is ready for offline install!'));
        }
    </script>
</body>
</html>
